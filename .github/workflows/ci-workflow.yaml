name: CI Pipeline
run-name: 'PR: #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.number }}'

on:   
  pull_request:
    branches: [develop]


jobs:
  preparation:
    runs-on: ubuntu-latest

    steps:
      - name: Add Link Annotation
        run: echo "::notice title=Pull Request::#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.number }}'"

  restore-dependecies:
    runs-on: ubuntu-latest

    outputs:
      cache_key: ${{ steps.execute.outputs.cache_key }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute
        id: execute
        uses: mihben/actions-repository/.github/actions/dotnet/restore-dependencies@feature/dotnet-actions
        with:
          working-directory: src
          packages-directory: ${{ github.workspace }}

  build:
    needs: [restore-dependecies]
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.execute.outputs.artifact_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute
        id: execute
        uses: mihben/actions-repository/.github/actions/dotnet/build@feature/dotnet-actions
        with:
          working-directory: src
          cache_key: ${{ needs.restore-dependecies.outputs.cache_key }}
          packages-directory: ${{ github.workspace }}

  test:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute
        uses: mihben/actions-repository/.github/actions/dotnet/test@feature/dotnet-actions
        with:
          artifact_name: ${{ needs.build.outputs.artifact_name }}
