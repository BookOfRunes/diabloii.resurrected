name: "Pull Request Title"

on: workflow_dispatch

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore --results-directory test-results --logger trx --collect:"XPlat Code Coverage;Format=cobertura"
        continue-on-error: true

      - name: Debug
        run: |
          cd test-results
          ls -a

      - name: Install TestSpace CLI
        uses: testspace-com/setup-testspace@v1
        with:
          domain: ${{ github.repository_owner }}

      - name: Publish Test Results
        run: testspace test-results/*.trx test-results/**/coverage.cobertura.xml
