name: CD Pipeline

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Calculate Version
        id: version
        run: |
          git fetch --prune --unshallow --tags
          git describe --tag
          git describe --tag | cut -c 1-
          echo "VERSION_NUMBER=git describe --tag | cut -c 1-" >> GITHUB_OUTPUT

      - name: Write Version
        run: echo ${{ steps.version.outputs.VERSION_NUMBER }}
